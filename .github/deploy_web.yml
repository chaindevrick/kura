name: Deploy Web to GCP

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'web/**'
      - '.github/deploy_web.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  SERVICE_NAME: kura-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build Docker image
        run: |
          docker build -t gcr.io/$GCP_PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
                       -t gcr.io/$GCP_PROJECT_ID/$SERVICE_NAME:latest \
                       ./web

      - name: Push to Google Container Registry
        run: |
          docker push gcr.io/$GCP_PROJECT_ID/$SERVICE_NAME:${{ github.sha }}
          docker push gcr.io/$GCP_PROJECT_ID/$SERVICE_NAME:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=gcr.io/$GCP_PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            --region=$GCP_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=900 \
            --set-env-vars=NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }},NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            --project=$GCP_PROJECT_ID

      - name: Output deployment URL
        run: |
          echo "Deployment completed!"
          echo "Service URL: https://$SERVICE_NAME-${{ env.GCP_REGION }}.run.app"
