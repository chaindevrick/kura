<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <radialGradient id="bgGlowLeft" cx="30%" cy="50%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b1f6e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0b0b0f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlowRight" cx="80%" cy="45%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b0b0f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="85%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="chartFill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="85%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.3"/>
    </linearGradient>

    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="chartAreaClip">
      <rect x="662" y="112" width="454" height="340" rx="4"/>
    </clipPath>

  </defs>

  <!-- base background -->
  <rect width="1200" height="630" fill="#0b0b0f"/>
  <rect width="1200" height="630" fill="url(#bgGlowLeft)"/>
  <rect width="1200" height="630" fill="url(#bgGlowRight)"/>

  <!-- grid lines -->
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <g opacity="0.025" stroke="#ffffff" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="230"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-2">Kura</text>

  <!-- tagline -->
  <text x="80" y="285"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#9ca3af" letter-spacing="-0.3">One app to manage your financial life</text>
  <text x="80" y="317"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#9ca3af" letter-spacing="-0.3">from TradFi to crypto.</text>

  <!-- feature pills -->
  <rect x="80" y="352" width="130" height="30" rx="15" fill="#1a1a24" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="145" y="371"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="500" fill="#a78bfa" text-anchor="middle">Bank Accounts</text>

  <rect x="222" y="352" width="96" height="30" rx="15" fill="#1a1a24" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="270" y="371"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="500" fill="#93c5fd" text-anchor="middle">DeFi &amp; Crypto</text>

  <rect x="330" y="352" width="116" height="30" rx="15" fill="#1a1a24" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <text x="388" y="371"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="500" fill="#6ee7b7" text-anchor="middle">Zero-Access E2EE</text>

  <!-- divider + url -->
  <line x1="80" y1="418" x2="490" y2="418" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="80" y="446"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="17" font-weight="500" fill="#6b7280" letter-spacing="0.2">kura-finance.com</text>

  <!-- dashboard card outer glow -->
  <rect x="635" y="90" width="500" height="450" rx="24" fill="#8b5cf6" opacity="0.05" filter="url(#cardGlow)"/>

  <!-- dashboard card -->
  <rect x="645" y="98" width="480" height="434" rx="20" fill="#111118"/>
  <rect x="644" y="97" width="482" height="436" rx="21" fill="none" stroke="url(#cardBorder)" stroke-width="1.5"/>

  <!-- card header -->
  <text x="672" y="132"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="13" font-weight="500" fill="#6b7280" letter-spacing="0.5">PORTFOLIO OVERVIEW</text>
  <text x="672" y="163"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-1">$284,521.40</text>

  <!-- change badge -->
  <rect x="672" y="174" width="88" height="24" rx="6" fill="#10b981" fill-opacity="0.15"/>
  <text x="716" y="190"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">+8.42%</text>

  <!-- chart guide lines -->
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.05">
    <line x1="662" y1="230" x2="1108" y2="230"/>
    <line x1="662" y1="280" x2="1108" y2="280"/>
    <line x1="662" y1="330" x2="1108" y2="330"/>
    <line x1="662" y1="380" x2="1108" y2="380"/>
    <line x1="662" y1="430" x2="1108" y2="430"/>
  </g>

  <!-- secondary chart (TradFi, blue dashed) -->
  <g clip-path="url(#chartAreaClip)">
    <path d="M662 430 C700 420 730 400 780 390 C820 380 850 375 890 360 C930 345 960 340 1000 325 C1030 315 1070 310 1108 300 L1108 452 L662 452 Z"
          fill="url(#chartFill2)"/>
    <path d="M662 430 C700 420 730 400 780 390 C820 380 850 375 890 360 C930 345 960 340 1000 325 C1030 315 1070 310 1108 300"
          stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.5" fill="none" stroke-dasharray="6,4"/>
  </g>

  <!-- primary chart (total, purple) -->
  <g clip-path="url(#chartAreaClip)">
    <path d="M662 410 C690 395 720 370 770 345 C810 325 845 305 890 278 C930 256 965 242 1000 222 C1035 205 1070 196 1108 186 L1108 452 L662 452 Z"
          fill="url(#chartFill)"/>
    <path d="M662 410 C690 395 720 370 770 345 C810 325 845 305 890 278 C930 256 965 242 1000 222 C1035 205 1070 196 1108 186"
          stroke="#8b5cf6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="1108" cy="186" r="5" fill="#8b5cf6"/>
    <circle cx="1108" cy="186" r="9" fill="#8b5cf6" fill-opacity="0.2"/>
  </g>

  <!-- asset rows -->
  <line x1="662" y1="460" x2="1108" y2="460" stroke="#ffffff" stroke-width="1" stroke-opacity="0.06"/>

  <rect x="662" y="468" width="14" height="14" rx="3" fill="#f59e0b" fill-opacity="0.9"/>
  <text x="684" y="480"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="600" fill="#d1d5db">BTC</text>
  <text x="750" y="480"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" fill="#6b7280">$96,200</text>

  <rect x="810" y="468" width="14" height="14" rx="3" fill="#60a5fa" fill-opacity="0.9"/>
  <text x="832" y="480"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="600" fill="#d1d5db">ETH</text>
  <text x="898" y="480"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" fill="#6b7280">$3,280</text>

  <rect x="958" y="468" width="14" height="14" rx="3" fill="#34d399" fill-opacity="0.9"/>
  <text x="980" y="480"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" font-weight="600" fill="#d1d5db">S&amp;P</text>
  <text x="1014" y="480"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="12" fill="#6b7280">5,612 pts</text>

  <!-- bottom border -->
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>

</svg>
