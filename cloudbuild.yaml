steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/kura-web:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/kura-web:latest"
      - "."

  # Step 2: Push image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/kura-web:$SHORT_SHA"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/run"
    args:
      - "deploy"
      - "kura-web"
      - "--image=gcr.io/$PROJECT_ID/kura-web:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--timeout=900"
      - "--set-env-vars=NEXT_PUBLIC_BACKEND_URL=https://kura-backend-642134687769.us-central1.run.app,NEXT_PUBLIC_APP_URL=https://kura-web-REGION.run.app"

images:
  - "gcr.io/$PROJECT_ID/kura-web:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/kura-web:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "N1_HIGHCPU_8"

timeout: "3600s"
